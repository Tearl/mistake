AWSTemplateFormatVersion: "2010-09-09"
Description: Scheduled Lambda API checks and CloudWatch alarm for the mistake production service.

Parameters:
  CheckerName:
    Type: String
    Default: mistake-prod-api
    Description: Name shared by the Lambda checker, schedule, metric dimension, and alarm.
    AllowedPattern: "^[a-z0-9-]{1,48}$"
  TargetBaseUrl:
    Type: String
    Default: https://api.toton123.xyz
    Description: HTTPS origin to inspect, without a trailing path.
    AllowedPattern: "^https://[^/]+/?$"
  ApiKeyParameterName:
    Type: String
    Default: /mistake/API_KEY
    Description: SSM SecureString containing X-API-Key. Leave empty to skip the authenticated /api/stats check.
    AllowedPattern: '^$|^/[-A-Za-z0-9_./]+$'
    ConstraintDescription: Must be empty or an absolute SSM parameter path such as /mistake/API_KEY. In Git Bash, set MSYS_NO_PATHCONV=1.
  ApiKeyKmsKeyArn:
    Type: String
    Default: ""
    Description: Optional customer-managed KMS key ARN used by the SecureString. Leave empty when using alias/aws/ssm.
  ScheduleExpression:
    Type: String
    Default: rate(5 minutes)
    Description: EventBridge Scheduler rate or cron expression.
  ScheduleState:
    Type: String
    Default: ENABLED
    AllowedValues:
      - ENABLED
      - DISABLED
    Description: Enables or pauses the EventBridge schedule without removing monitoring resources.
  AlarmPeriodSeconds:
    Type: Number
    Default: 300
    MinValue: 60
    Description: CloudWatch alarm period. Keep this equal to the schedule interval.
  FunctionTimeoutSeconds:
    Type: Number
    Default: 30
    MinValue: 3
    MaxValue: 900
    Description: Maximum checker Lambda execution time.
  LogRetentionDays:
    Type: Number
    Default: 30
    AllowedValues:
      - 1
      - 3
      - 5
      - 7
      - 14
      - 30
      - 60
      - 90
      - 120
      - 150
      - 180
      - 365
      - 400
      - 545
      - 731
      - 1096
      - 1827
      - 2192
      - 2557
      - 2922
      - 3288
      - 3653
    Description: CloudWatch Logs retention period for checker output.
  NotificationEmail:
    Type: String
    Default: ""
    Description: Optional email address for alarm notifications. The recipient must confirm the SNS subscription.

Conditions:
  HasApiKeyParameter: !Not [!Equals [!Ref ApiKeyParameterName, ""]]
  HasApiKeyKmsKey: !Not [!Equals [!Ref ApiKeyKmsKeyArn, ""]]
  HasNotificationEmail: !Not [!Equals [!Ref NotificationEmail, ""]]

Resources:
  CheckerLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub "/aws/lambda/${CheckerName}"
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: app
          Value: mistake
        - Key: component
          Value: api-monitor

  CheckerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RunMistakeApiChecks
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: WriteCheckerLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${CheckerName}:*"
              - Sid: PublishCheckMetric
                Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: "*"
                Condition:
                  StringEquals:
                    cloudwatch:namespace: Mistake/Monitoring
              - !If
                - HasApiKeyParameter
                - Sid: ReadApiKey
                  Effect: Allow
                  Action:
                    - ssm:GetParameter
                  Resource: !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ApiKeyParameterName}"
                - !Ref AWS::NoValue
              - !If
                - HasApiKeyKmsKey
                - Sid: DecryptApiKey
                  Effect: Allow
                  Action:
                    - kms:Decrypt
                  Resource: !Ref ApiKeyKmsKeyArn
                - !Ref AWS::NoValue
      Tags:
        - Key: app
          Value: mistake
        - Key: component
          Value: api-monitor

  ApiCheckerFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - CheckerLogGroup
    Properties:
      FunctionName: !Ref CheckerName
      Description: Checks the production health and authenticated stats API endpoints.
      Runtime: nodejs22.x
      Handler: index.handler
      Architectures:
        - arm64
      MemorySize: 512
      Timeout: !Ref FunctionTimeoutSeconds
      Role: !GetAtt CheckerExecutionRole.Arn
      Environment:
        Variables:
          API_KEY_PARAMETER_NAME: !Ref ApiKeyParameterName
          CHECK_NAME: !Ref CheckerName
          METRIC_NAMESPACE: Mistake/Monitoring
          TARGET_BASE_URL: !Ref TargetBaseUrl
      Code:
        ZipFile: |
          const { CloudWatchClient, PutMetricDataCommand } = require("@aws-sdk/client-cloudwatch");
          const { GetParameterCommand, SSMClient } = require("@aws-sdk/client-ssm");

          const cloudWatch = new CloudWatchClient({});
          const ssm = new SSMClient({});
          const MAX_BODY_BYTES = 1024 * 1024;
          const REQUEST_TIMEOUT_MS = 10000;

          const log = (level, event, fields = {}) => {
            console[level](JSON.stringify({ event, ...fields }));
          };

          const errorMessage = (error) => {
            if (error instanceof Error) return error.message;
            return String(error);
          };

          const requestText = async (url, headers = {}) => {
            const startedAt = Date.now();
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);

            try {
              const response = await fetch(url, {
                method: "GET",
                headers: {
                  Accept: "application/json, text/plain;q=0.9",
                  "User-Agent": "mistake-api-monitor",
                  ...headers,
                },
                redirect: "follow",
                signal: controller.signal,
              });

              const declaredLength = Number(response.headers.get("content-length") || 0);
              if (declaredLength > MAX_BODY_BYTES) {
                throw new Error("response body exceeded 1 MiB");
              }

              const chunks = [];
              let bodyLength = 0;
              if (response.body) {
                const reader = response.body.getReader();
                while (true) {
                  const { done, value } = await reader.read();
                  if (done) break;
                  bodyLength += value.byteLength;
                  if (bodyLength > MAX_BODY_BYTES) {
                    await reader.cancel();
                    throw new Error("response body exceeded 1 MiB");
                  }
                  chunks.push(Buffer.from(value));
                }
              }
              const bodyBuffer = Buffer.concat(chunks, bodyLength);

              return {
                body: bodyBuffer.toString("utf8"),
                durationMs: Date.now() - startedAt,
                status: response.status,
              };
            } catch (error) {
              if (error && error.name === "AbortError") {
                throw new Error(`request timed out after ${REQUEST_TIMEOUT_MS}ms`);
              }
              throw error;
            } finally {
              clearTimeout(timeout);
            }
          };

          const assert2xx = (result, stepName) => {
            if (result.status < 200 || result.status > 299) {
              throw new Error(`${stepName} returned HTTP ${result.status}`);
            }
          };

          const checkHealth = async (baseUrl) => {
            const result = await requestText(new URL("/health", baseUrl));
            assert2xx(result, "health");
            if (result.body.trim() !== "ok") {
              throw new Error("health returned an unexpected body");
            }
            log("info", "step_passed", {
              step: "health",
              status: result.status,
              durationMs: result.durationMs,
            });
          };

          const readApiKey = async (parameterName) => {
            const result = await ssm.send(new GetParameterCommand({
              Name: parameterName,
              WithDecryption: true,
            }));
            const value = result.Parameter && result.Parameter.Value;
            if (!value) throw new Error(`SSM parameter ${parameterName} is empty`);
            return value;
          };

          const checkStats = async (baseUrl, apiKey) => {
            const result = await requestText(
              new URL("/api/stats", baseUrl),
              { "X-API-Key": apiKey },
            );
            assert2xx(result, "stats");

            let stats;
            try {
              stats = JSON.parse(result.body);
            } catch (error) {
              throw new Error(`stats did not return JSON: ${errorMessage(error)}`);
            }

            if (
              typeof stats.total !== "number" ||
              !Array.isArray(stats.weekly) ||
              !Array.isArray(stats.bySubject)
            ) {
              throw new Error("stats response is missing total, weekly, or bySubject");
            }

            log("info", "step_passed", {
              step: "stats",
              status: result.status,
              durationMs: result.durationMs,
            });
          };

          const publishResult = async (success) => {
            await cloudWatch.send(new PutMetricDataCommand({
              Namespace: process.env.METRIC_NAMESPACE,
              MetricData: [{
                MetricName: "CheckSuccess",
                Dimensions: [{ Name: "CheckName", Value: process.env.CHECK_NAME }],
                Timestamp: new Date(),
                Unit: "Count",
                Value: success ? 1 : 0,
              }],
            }));
          };

          exports.handler = async () => {
            const startedAt = Date.now();
            let success = false;
            let failure;

            try {
              const baseUrl = new URL(process.env.TARGET_BASE_URL);
              await checkHealth(baseUrl);

              const parameterName = process.env.API_KEY_PARAMETER_NAME;
              if (parameterName) {
                const apiKey = await readApiKey(parameterName);
                await checkStats(baseUrl, apiKey);
              }

              success = true;
            } catch (error) {
              failure = errorMessage(error);
              log("error", "check_failed", { message: failure });
            }

            try {
              await publishResult(success);
            } catch (error) {
              log("error", "metric_publish_failed", { message: errorMessage(error) });
              throw error;
            }

            log("info", "check_completed", {
              success,
              durationMs: Date.now() - startedAt,
            });

            return success ? { success: true } : { success: false, error: failure };
          };
      Tags:
        - Key: app
          Value: mistake
        - Key: component
          Value: api-monitor

  SchedulerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeMistakeApiChecker
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt ApiCheckerFunction.Arn
      Tags:
        - Key: app
          Value: mistake
        - Key: component
          Value: api-monitor

  ApiCheckSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub "${CheckerName}-schedule"
      Description: !Sub "Runs ${CheckerName} on ${ScheduleExpression}."
      FlexibleTimeWindow:
        Mode: "OFF"
      ScheduleExpression: !Ref ScheduleExpression
      State: !Ref ScheduleState
      Target:
        Arn: !GetAtt ApiCheckerFunction.Arn
        Input: '{"source":"eventbridge-scheduler"}'
        RetryPolicy:
          MaximumEventAgeInSeconds: 300
          MaximumRetryAttempts: 2
        RoleArn: !GetAtt SchedulerExecutionRole.Arn

  AlarmTopic:
    Type: AWS::SNS::Topic
    Condition: HasNotificationEmail
    Properties:
      DisplayName: mistake-api-monitor
      Tags:
        - Key: app
          Value: mistake
        - Key: component
          Value: api-monitor

  AlarmEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasNotificationEmail
    Properties:
      Endpoint: !Ref NotificationEmail
      Protocol: email
      TopicArn: !Ref AlarmTopic

  ApiCheckFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${CheckerName}-failed"
      AlarmDescription: !Sub "${CheckerName} failed twice or stopped publishing results."
      ActionsEnabled: true
      AlarmActions: !If
        - HasNotificationEmail
        - [!Ref AlarmTopic]
        - []
      OKActions: !If
        - HasNotificationEmail
        - [!Ref AlarmTopic]
        - []
      ComparisonOperator: LessThanThreshold
      DatapointsToAlarm: 2
      Dimensions:
        - Name: CheckName
          Value: !Ref CheckerName
      EvaluationPeriods: 2
      MetricName: CheckSuccess
      Namespace: Mistake/Monitoring
      Period: !Ref AlarmPeriodSeconds
      Statistic: Minimum
      Threshold: 1
      TreatMissingData: breaching
      Tags:
        - Key: app
          Value: mistake
        - Key: component
          Value: api-monitor

Outputs:
  CheckerFunctionName:
    Value: !Ref ApiCheckerFunction
  CheckerLogGroupName:
    Value: !Ref CheckerLogGroup
  ScheduleName:
    Value: !Ref ApiCheckSchedule
  FailureAlarmName:
    Value: !Ref ApiCheckFailureAlarm
  AlarmTopicArn:
    Condition: HasNotificationEmail
    Value: !Ref AlarmTopic
